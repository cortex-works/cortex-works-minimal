[build]
# rustc-wrapper = "/opt/homebrew/bin/sccache"  # macOS only; commented for Linux compatibility

# Use the platform default linker on macOS. This avoids hardcoded Homebrew paths and keeps
# `cargo build --release -p cortex-mcp` working on a standard Xcode Command Line Tools setup.

[alias]
# Fast local build helpers
bfast = "build --profile release-fast"
mcp-fast = "build -p cortex-mcp --profile release-fast"
ws-fast = "build --workspace --profile release-fast"
ckws = "check --workspace"

# App build helpers
# NOTE: Tauri CLI `-c` only merges config; `-- --package` goes to Tauri's args, not cargo.
# Use --manifest-path so cargo finds the correct crate, then Tauri reads tauri.conf.json
# from the same directory as that Cargo.toml.
tauri-daemon = "tauri build -- --manifest-path apps/cortex-daemon/Cargo.toml"

# Alias kept for backward-compat (maps old tauri-sync → cortex-daemon)
tauri-sync = "tauri build -- --manifest-path apps/cortex-daemon/Cargo.toml"

# CortexDaemon dev mode (hot-reload, debug binary)
tauri-daemon-dev = "tauri dev -- --manifest-path apps/cortex-daemon/Cargo.toml"

# Legacy alias
tauri-sync-dev = "tauri dev -- --manifest-path apps/cortex-daemon/Cargo.toml"

# Build CortexStudio desktop binary (compile-only, no bundle)
studio = "build --manifest-path apps/cortex-studio/src-tauri/Cargo.toml"

# Alias kept for symmetry with sync naming
studio-dev = "build --manifest-path apps/cortex-studio/src-tauri/Cargo.toml"
